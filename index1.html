<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">amazon</div>
  <input type="text" placeholder="Search Amazon">
  <button>Search</button>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to Amazon Clone</h1>
</section>

<!-- PRODUCTS -->
<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 1</h3>
    <p>$19.99</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 2</h3>
    <p>$29.99</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 3</h3>
    <p>$39.99</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 4</h3>
    <p>$49.99</p>
    <button>Add to Cart</button>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Amazon Clone</p>
</footer>

</body>
</html>
